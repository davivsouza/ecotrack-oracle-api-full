spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecotrack}
spring.datasource.username=${DB_USER:ecotrack}
spring.datasource.password=${DB_PASSWORD:ecotrack}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-postgres.sql

# opcional para facilitar debug local
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
