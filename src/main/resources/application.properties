spring.application.name=ecotrack-oracle-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//oracle.fiap.com.br:1521/orcl}
spring.datasource.username=${DB_USER:rm560262}
spring.datasource.password=${DB_PASSWORD:170804}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

ecotrack.security.jwt-secret=${JWT_SECRET:ecotrack-dev-secret}
ecotrack.security.jwt-expiration-minutes=${JWT_EXP_MINUTES:10080}
ecotrack.security.admin-emails=${ADMIN_EMAILS:}

ecotrack.open-food-facts-url=${OPEN_FOOD_FACTS_URL:https://world.openfoodfacts.org/api/v2}
ecotrack.internal-api.base-url=${INTERNAL_API_BASE_URL:http://localhost:${server.port}}

ecotrack.messaging.enabled=${MESSAGING_ENABLED:false}
ecotrack.messaging.exchange=${MESSAGING_EXCHANGE:ecotrack.events}
ecotrack.messaging.queue=${MESSAGING_QUEUE:ecotrack.activity.queue}
ecotrack.messaging.routing-key=${MESSAGING_ROUTING_KEY:ecotrack.activity}
