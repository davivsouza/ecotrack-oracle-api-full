spring.application.name=ecotrack-oracle-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecotrack}
spring.datasource.username=${DB_USER:ecotrack}
spring.datasource.password=${DB_PASSWORD:ecotrack}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-postgres.sql

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

ecotrack.security.jwt-secret=${JWT_SECRET:ecotrack-dev-secret}
ecotrack.security.jwt-expiration-minutes=${JWT_EXP_MINUTES:10080}
ecotrack.security.admin-emails=${ADMIN_EMAILS:admin@ecotrack.com}

ecotrack.open-food-facts-url=${OPEN_FOOD_FACTS_URL:https://world.openfoodfacts.org/api/v2}
ecotrack.internal-api.base-url=${INTERNAL_API_BASE_URL:http://localhost:${server.port}}

ecotrack.messaging.enabled=${MESSAGING_ENABLED:true}
ecotrack.messaging.exchange=${MESSAGING_EXCHANGE:ecotrack.events}
ecotrack.messaging.queue=${MESSAGING_QUEUE:ecotrack.activity.queue}
ecotrack.messaging.routing-key=${MESSAGING_ROUTING_KEY:ecotrack.activity}
