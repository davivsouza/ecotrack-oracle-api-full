services:
  postgres:
    image: postgres:16-alpine
    container_name: ecotrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecotrack
      POSTGRES_USER: ecotrack
      POSTGRES_PASSWORD: ecotrack
    ports:
      - "5432:5432"
    volumes:
      - ecotrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecotrack -d ecotrack"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ecotrack_postgres_data:
